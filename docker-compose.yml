services:
  emotion-llama:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        HF_TOKEN: ${HF_TOKEN:-}
        HF_MODEL_REPO: ${HF_MODEL_REPO:-doughnut23/emollama-models}
        HF_REPO_TYPE: ${HF_REPO_TYPE:-model}
    image: emotion-llama:latest
    container_name: emotion-llama-app
    command: ["python", "app_EmotionLlamaClient.py"]

    # Port mappings
    ports:
      - "7889:7889"    # Emotion-LLaMA client demo (Gradio)

    # Volume mounts
    volumes:
      # Persist logs on the host (writable)
      - ./logs:/app/logs

    # Environment variables
    environment:
      - CUDA_VISIBLE_DEVICES=0  # adjust to your GPU IDs if multiple GPUs
      - HF_TOKEN
      - HF_MODEL_REPO=doughnut23/emollama-models
      - HF_REPO_TYPE=model

    gpus: all

    # Restart policy
    restart: unless-stopped

    # Resource limits (optional, adjust based on your system)
    # mem_limit: '32g'
    # cpus: '4'
